name: Build

# Build on every branch push, tag push, and pull request change:
on:
  push:
  pull_request:

jobs:
  build_repo:
    # This is a *private* build container.
    container: ghcr.io/angheloalf/puzzleleague64-build:main

    name: Build repo
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: [usa, eur, fra, ger]

    steps:
      - name: Checkout reposistory
        uses: actions/checkout@v6

      - name: Install system requirements
        run: |
          apt-get install -y make git build-essential clang binutils-mips-linux-gnu gcc-mips-linux-gnu python3 python3-pip clang-format-14 clang-tidy-14
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync uv
        run: |
          uv sync

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get the dependency
        run: cp /orig/baserom.${{ matrix.version }}.z64 config/${{ matrix.version }}/baserom.${{ matrix.version }}.z64

      - name: Setup
        run: make setup -j $(nproc) VERSION=${{ matrix.version }}

      - name: Disassemble and extraction
        run: make extract -j $(nproc) VERSION=${{ matrix.version }}

      - name: Build Pokémon Puzzle League
        run: make -j $(nproc) WERROR=1 VERSION=${{ matrix.version }}

      - name: Generate objdiff report
        run: uv run mapfile_parser objdiff_report report.json --version ${{ matrix.version }}

      - name: Upload progress report artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.version }}_report
          path: report.json

      - name: Upload map
        uses: actions/upload-artifact@v7
        with:
          name: puzzleleague64.${{ matrix.version }}.map
          path: build/${{ matrix.version }}/puzzleleague64.${{ matrix.version }}.map

      - name: Generate PJ64 symbols file
        run: uv run tools/pj64_syms.py --version ${{ matrix.version }} -o puzzleleague64.${{ matrix.version }}.sym

      - name: Upload PJ64 symbols file
        uses: actions/upload-artifact@v7
        with:
          name: puzzleleague64.${{ matrix.version }}.sym
          path: puzzleleague64.${{ matrix.version }}.sym
